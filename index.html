<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>API易 AI对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pri:#6366f1;--bg:#f7f8fa;--card:#fff;--txt:#1a1a2e;--txt2:#8b8fa3;--bdr:#e8e8ed;--safe-b:env(safe-area-inset-bottom)}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column}
.hd{background:var(--card);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--bdr);flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.hd-t{font-size:17px;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-r{display:flex;gap:8px}
.hd-b{width:36px;height:36px;border-radius:50%;border:none;background:#f0f1f5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ct{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.em{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--txt2);gap:12px}
.em-i{font-size:56px;opacity:.6}.em-t{font-size:16px;font-weight:600;color:var(--txt)}.em-s{font-size:13px;text-align:center;line-height:1.6;opacity:.7}
.msg{margin-bottom:14px;display:flex;flex-direction:column;max-width:85%}
.mu{align-self:flex-end;align-items:flex-end}.ma{align-self:flex-start;align-items:flex-start}
.bb{padding:12px 16px;font-size:15px;line-height:1.65;word-break:break-word}
.mu .bb{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:18px 18px 4px 18px;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.ma .bb{background:var(--card);border-radius:18px 18px 18px 4px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:.5px solid var(--bdr)}
.ma .bb p{margin:8px 0}.ma .bb p:first-child{margin-top:0}.ma .bb p:last-child{margin-bottom:0}
.ma .bb code{background:#f0f1f5;padding:2px 6px;border-radius:4px;font-size:13px;font-family:Menlo,Consolas,monospace;color:#e11d48}
.ma .bb pre{background:#1e293b;color:#e2e8f0;padding:14px;border-radius:10px;overflow-x:auto;margin:10px 0;font-size:13px;font-family:Menlo,Consolas,monospace}
.ma .bb pre code{background:none;padding:0;color:inherit}
.ma .bb ul,.ma .bb ol{padding-left:20px;margin:8px 0}.ma .bb blockquote{border-left:3px solid var(--pri);padding-left:12px;color:var(--txt2);margin:10px 0}
.ma .bb strong{font-weight:700}.ma .bb a{color:var(--pri)}
.tk-t{font-size:12px;color:var(--pri);cursor:pointer;padding:6px 4px;display:inline-flex;align-items:center;gap:4px;font-weight:500}
.tk-t::before{content:'▶';font-size:9px;transition:transform .2s}.tk-t.op::before{transform:rotate(90deg)}
.tk-b{display:none;font-size:12px;color:var(--txt2);padding:10px 12px;margin:4px 0 8px;background:#f8f9fc;border-radius:10px;border-left:3px solid var(--pri);white-space:pre-wrap;line-height:1.6;max-height:200px;overflow-y:auto}
.tk-b.sh{display:block}
.ib{background:var(--card);border-top:.5px solid var(--bdr);padding:10px 12px;flex-shrink:0;padding-bottom:max(10px,var(--safe-b))}
.iw{display:flex;gap:8px;align-items:flex-end;background:#f0f1f5;border-radius:24px;padding:6px 6px 6px 16px}
#mi{flex:1;border:none;background:transparent;font-size:16px;resize:none;max-height:100px;min-height:24px;line-height:1.5;outline:none;color:var(--txt);font-family:inherit}
#mi::placeholder{color:var(--txt2)}
.sb{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb.st{background:linear-gradient(135deg,#ef4444,#f97316)}
.so{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45)}.so.op{display:flex;align-items:flex-end}
.sp{background:var(--card);border-radius:20px 20px 0 0;padding:20px 16px 24px;width:100%;max-height:85vh;overflow-y:auto;animation:up .3s}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sp h2{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between}
.sc{width:30px;height:30px;border-radius:50%;border:none;background:#f0f1f5;font-size:14px;cursor:pointer}
.sg{margin-bottom:14px}.sg label{display:block;font-size:12px;color:var(--txt2);margin-bottom:6px;font-weight:500}
.sg input,.sg select,.sg textarea{width:100%;border:1.5px solid var(--bdr);border-radius:12px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
.sg input:focus,.sg select:focus{border-color:var(--pri)}.sg textarea{resize:vertical;min-height:70px}
.rr{display:flex;align-items:center;gap:10px}.rr input[type=range]{flex:1;accent-color:var(--pri)}.rr span{font-size:13px;min-width:36px;text-align:right;font-weight:600}
.tr{display:flex;align-items:center;justify-content:space-between;padding:4px 0}.tr span{font-size:14px}
.tg{width:48px;height:28px;background:#d1d5db;border-radius:14px;position:relative;cursor:pointer;transition:background .3s}
.tg.on{background:var(--pri)}.tg::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:50%;transition:left .3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}.tg.on::after{left:22px}
.sbs{display:flex;gap:10px;margin-top:18px}.sbs button{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.bc{background:#f0f1f5;color:var(--txt2)}.bs{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.ts{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,26,46,.85);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;z-index:300;pointer-events:none}
</style>
</head>
<body>
<div class="hd"><div class="hd-t">API易 AI对话</div><div class="hd-r"><div class="hd-b" onclick="clr()">🗑</div><div class="hd-b" onclick="opS()">⚙</div></div></div>
<div class="ct" id="ct"><div class="em"><div class="em-i">💬</div><div class="em-t">开始新对话</div><div class="em-s">点击右上角 ⚙ 设置API Key<br>选择模型后即可聊天</div></div></div>
<div class="ib"><div class="iw"><textarea id="mi" placeholder="输入消息..." rows="1"></textarea><button class="sb" id="sb" onclick="go()">▶</button></div></div>
<div class="so" id="sp" onclick="if(event.target===this)clS()">
<div class="sp">
<h2>设置 <button class="sc" onclick="clS()">✕</button></h2>
<div class="sg"><label>API Key</label><input type="password" id="sk" placeholder="sk-xxx"></div>
<div class="sg"><label>API地址</label><input id="su" value="https://api.apiyi.com/v1"></div>
<div class="sg"><label>模型</label><select id="sm">
<optgroup label="Grok"><option value="grok-4.3">grok-4.3</option><option value="grok-4.20-beta">grok-4.20-beta</option><option value="grok-4">grok-4</option><option value="grok-4-fast">grok-4-fast</option><option value="grok-4-1-fast">grok-4-1-fast</option></optgroup>
<optgroup label="Claude Opus"><option value="claude-opus-4-7">opus-4-7</option><option value="claude-opus-4-7-thinking">opus-4-7-thinking</option><option value="claude-opus-4-6">opus-4-6</option><option value="claude-opus-4-6-thinking">opus-4-6-thinking</option><option value="claude-opus-4-5-20251101">opus-4-5</option><option value="claude-opus-4-5-20251101-thinking">opus-4-5-thinking</option></optgroup>
<optgroup label="Claude Sonnet"><option value="claude-sonnet-4-6">sonnet-4-6</option><option value="claude-sonnet-4-6-thinking">sonnet-4-6-thinking</option><option value="claude-sonnet-4-5-20250929">sonnet-4-5</option><option value="claude-sonnet-4-5-20250929-thinking">sonnet-4-5-thinking</option><option value="claude-sonnet-4-20250514">sonnet-4</option><option value="claude-sonnet-4-20250514-thinking">sonnet-4-thinking</option></optgroup>
<optgroup label="Claude Haiku"><option value="claude-haiku-4-5-20251001">haiku-4-5</option><option value="claude-haiku-4-5-20251001-thinking">haiku-4-5-thinking</option></optgroup>
</select></div>
<div class="sg"><label>系统提示词</label><textarea id="ss" placeholder="你是一个有帮助的AI助手"></textarea></div>
<div class="sg"><label>Temperature</label><div class="rr"><input type="range" id="st" min="0" max="2" step="0.1" value="0.7"><span id="stv">0.7</span></div></div>
<div class="sg"><label>最大输出Token</label><input type="number" id="sx" value="4096" min="1" max="128000"></div>
<div class="sg"><label>Top P</label><div class="rr"><input type="range" id="sp2" min="0" max="1" step="0.05" value="1"><span id="spv">1</span></div></div>
<div class="sg tr"><span>显示思考过程</span><div class="tg on" id="st2" onclick="this.classList.toggle('on')"></div></div>
<div class="sbs"><button class="bc" onclick="clS()">取消</button><button class="bs" onclick="svS()">保存</button></div>
</div></div>
<script>
var C={key:"",baseUrl:"https://api.apiyi.com/v1",model:"grok-4.3",sys:"",temp:0.7,maxTok:4096,topP:1,showThink:true};
var H=[],busy=false,ac=null;
function ld(){try{var s=localStorage.getItem("acfg");if(s){var d=JSON.parse(s);for(var k in d){if(C.hasOwnProperty(k)){C[k]=d[k]}}}}catch(e){}}
function opS(){document.getElementById("sk").value=C.key;document.getElementById("su").value=C.baseUrl;document.getElementById("sm").value=C.model;document.getElementById("ss").value=C.sys;document.getElementById("st").value=C.temp;document.getElementById("stv").textContent=C.temp;document.getElementById("sx").value=C.maxTok;document.getElementById("sp2").value=C.topP;document.getElementById("spv").textContent=C.topP;document.getElementById("st2").className="tg"+(C.showThink?" on":"");document.getElementById("sp").classList.add("op")}
function clS(){document.getElementById("sp").classList.remove("op")}
function svS(){C.key=document.getElementById("sk").value.trim();C.baseUrl=document.getElementById("su").value.trim();C.model=document.getElementById("sm").value;C.sys=document.getElementById("ss").value.trim();C.temp=parseFloat(document.getElementById("st").value);C.maxTok=parseInt(document.getElementById("sx").value)||4096;C.topP=parseFloat(document.getElementById("sp2").value);C.showThink=document.getElementById("st2").classList.contains("on");localStorage.setItem("acfg",JSON.stringify(C));clS();tt("已保存")}
function tt(m){var t=document.createElement("div");t.className="ts";t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},1500)}
function md(t){if(!t)return"";t=t.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,l,c){return'<pre><code>'+ec(c.trim())+'</code></pre>'});t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');t=t.replace(/^#### (.+)$/gm,'<strong style="font-size:14px">$1</strong>');t=t.replace(/^### (.+)$/gm,'<strong style="font-size:15px">$1</strong>');t=t.replace(/^## (.+)$/gm,'<strong style="font-size:16px">$1</strong>');t=t.replace(/^# (.+)$/gm,'<strong style="font-size:18px">$1</strong>');t=t.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');t=t.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');t=t.replace(/(<li>.*<\/li>\n?)+/g,function(m2){return'<ul>'+m2+'</ul>'});t=t.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');t=t.replace(/^---$/gm,'<hr style="border:none;border-top:1px solid #e8e8ed;margin:10px 0">');var ps=t.split(/\n\n+/),h="";for(var i=0;i<ps.length;i++){var p=ps[i].trim();if(!p)continue;if(p[0]==='<'&&(p.indexOf('<pre>')===0||p.indexOf('<ul>')===0||p.indexOf('<blockquote>')===0||p.indexOf('<hr')===0||p.indexOf('<strong')===0)){h+=p}else{h+='<p>'+p.replace(/\n/g,'<br>')+'</p>'}}return h}
function ec(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function aM(role,txt,think){var ch=document.getElementById("ct");var em=ch.querySelector('.em');if(em)em.remove();var d=document.createElement("div");d.className="msg "+(role==="user"?"mu":"ma");if(role==="user"){var b=document.createElement("div");b.className="bb";b.textContent=txt;d.appendChild(b)}else{if(think&&C.showThink){var tt2=document.createElement("div");tt2.className="tk-t";tt2.textContent="思考过程";var tb=document.createElement("div");tb.className="tk-b";tb.textContent=think;tt2.onclick=function(){this.classList.toggle("op");tb.classList.toggle("sh")};d.appendChild(tt2);d.appendChild(tb)}var b=document.createElement("div");b.className="bb";b.innerHTML=md(txt);d.appendChild(b)}ch.appendChild(d);ch.scrollTop=9e9;return b}
function uB(b,t){b.innerHTML=md(t);document.getElementById("ct").scrollTop=9e9}
function clr(){H=[];document.getElementById("ct").innerHTML='<div class="em"><div class="em-i">💬</div><div class="em-t">开始新对话</div><div class="em-s">点击右上角 ⚙ 设置API Key<br>选择模型后即可聊天</div></div>';tt("已清空")}
async function go(){var inp=document.getElementById("mi");var txt=inp.value.trim();if(!txt||busy)return;if(!C.key){tt("请先设置API Key");opS();return}inp.value="";inp.style.height="auto";busy=true;var btn=document.getElementById("sb");btn.innerHTML="■";btn.classList.add("st");btn.onclick=stp;aM("user",txt);H.push({role:"user",content:txt});var ms=[];if(C.sys)ms.push({role:"system",content:C.sys});ms=ms.concat(H);var bd={model:C.model,messages:ms,temperature:C.temp,top_p:C.topP,max_tokens:C.maxTok,stream:true};var bbl=aM("ai","");var aiT="",thkT="",inThk=false;try{ac=new AbortController();var r=await fetch(C.baseUrl+"/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+C.key},body:JSON.stringify(bd),signal:ac.signal});if(!r.ok){var e=await r.text();try{e=JSON.parse(e).error.message||e}catch(ex){}bbl.innerHTML='<span style="color:#ef4444">⚠ '+ec(e)+'</span>';H.pop();busy=false;rsB();return}var rd=r.body.getReader();var dc=new TextDecoder();var buf="";while(true){var res=await rd.read();if(res.done)break;buf+=dc.decode(res.value,{stream:true});var ls=buf.split("\n");buf=ls.pop();for(var i=0;i<ls.length;i++){var ln=ls[i].trim();if(!ln||!ln.startsWith("data:"))continue;var dt=ln.slice(5).trim();if(dt==="[DONE]")break;try{var j=JSON.parse(dt);var dl=j.choices&&j.choices[0]&&j.choices[0].delta;if(dl){if(dl.reasoning_content){thkT+=dl.reasoning_content;inThk=true}if(dl.content){if(inThk)inThk=false;aiT+=dl.content}uB(bbl,aiT)}}catch(ex){}}}}catch(e){if(e.name!=="AbortError"){bbl.innerHTML='<span style="color:#ef4444">⚠ '+ec(e.message)+'</span>';H.pop()}}if(aiT)H.push({role:"assistant",content:aiT});if(thkT&&C.showThink){var md2=bbl.parentElement;var tt3=document.createElement("div");tt3.className="tk-t";tt3.textContent="思考过程";var tb2=document.createElement("div");tb2.className="tk-b";tb2.textContent=thkT;tt3.onclick=function(){this.classList.toggle("op");tb2.classList.toggle("sh")};md2.insertBefore(tb2,md2.firstChild);md2.insertBefore(tt3,md2.firstChild)}busy=false;rsB()}
function stp(){if(ac){ac.abort();ac=null}busy=false;rsB()}
function rsB(){var b=document.getElementById("sb");b.innerHTML="▶";b.classList.remove("st");b.onclick=go}
document.getElementById("mi").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,100)+"px"});
document.getElementById("mi").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey&&!e.isComposing){e.preventDefault();go()}});
document.getElementById("st").addEventListener("input",function(){document.getElementById("stv").textContent=this.value});
document.getElementById("sp2").addEventListener("input",function(){document.getElementById("spv").textContent=this.value});
ld();
</script>
</body>
</html>

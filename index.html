<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>API易 AI对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pri:#6366f1;--bg:#f7f8fa;--card:#fff;--txt:#1a1a2e;--txt2:#8b8fa3;--bdr:#e8e8ed;--radius:18px;--safe-b:env(safe-area-inset-bottom)}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column}
.hd{background:var(--card);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--bdr);flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.hd-title{font-size:17px;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-right{display:flex;gap:8px}
.hd-btn{width:36px;height:36px;border-radius:50%;border:none;background:#f0f1f5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--txt2);gap:12px}
.empty-icon{font-size:56px;opacity:.6}
.empty-t{font-size:16px;font-weight:600;color:var(--txt)}
.empty-s{font-size:13px;text-align:center;line-height:1.6;opacity:.7}
.msg{margin-bottom:14px;display:flex;flex-direction:column;max-width:85%}
.msg-u{align-self:flex-end;align-items:flex-end}
.msg-a{align-self:flex-start;align-items:flex-start}
.bbl{padding:12px 16px;font-size:15px;line-height:1.65;word-break:break-word}
.msg-u .bbl{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:18px 18px 4px 18px;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.msg-a .bbl{background:var(--card);border-radius:18px 18px 18px 4px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:0.5px solid var(--bdr)}
.msg-a .bbl p{margin:8px 0}.msg-a .bbl p:first-child{margin-top:0}.msg-a .bbl p:last-child{margin-bottom:0}
.msg-a .bbl code{background:#f0f1f5;padding:2px 6px;border-radius:4px;font-size:13px;font-family:Menlo,Consolas,monospace;color:#e11d48}
.msg-a .bbl pre{background:#1e293b;color:#e2e8f0;padding:14px;border-radius:10px;overflow-x:auto;margin:10px 0;font-size:13px;font-family:Menlo,Consolas,monospace}
.msg-a .bbl pre code{background:none;padding:0;color:inherit}
.msg-a .bbl ul,.msg-a .bbl ol{padding-left:20px;margin:8px 0}
.msg-a .bbl blockquote{border-left:3px solid var(--pri);padding-left:12px;color:var(--txt2);margin:10px 0}
.msg-a .bbl strong{font-weight:700}
.msg-a .bbl a{color:var(--pri)}
.thk-toggle{font-size:12px;color:var(--pri);cursor:pointer;padding:6px 4px;display:inline-flex;align-items:center;gap:4px;font-weight:500}
.thk-toggle::before{content:'▶';font-size:9px;transition:transform .2s}
.thk-toggle.open::before{transform:rotate(90deg)}
.thk-box{display:none;font-size:12px;color:var(--txt2);padding:10px 12px;margin:4px 0 8px;background:#f8f9fc;border-radius:10px;border-left:3px solid var(--pri);white-space:pre-wrap;line-height:1.6;max-height:200px;overflow-y:auto}
.thk-box.show{display:block}
.input-bar{background:var(--card);border-top:0.5px solid var(--bdr);padding:10px 12px;flex-shrink:0;padding-bottom:max(10px,var(--safe-b))}
.input-wrap{display:flex;gap:8px;align-items:flex-end;background:#f0f1f5;border-radius:24px;padding:6px 6px 6px 16px}
#msgInput{flex:1;border:none;background:transparent;font-size:16px;resize:none;max-height:100px;min-height:24px;line-height:1.5;outline:none;color:var(--txt);font-family:inherit}
#msgInput::placeholder{color:var(--txt2)}
.send-btn{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn.stop{background:linear-gradient(135deg,#ef4444,#f97316)}
.set-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45)}
.set-overlay.open{display:flex;align-items:flex-end}
.set-panel{background:var(--card);border-radius:20px 20px 0 0;padding:20px 16px 24px;width:100%;max-height:85vh;overflow-y:auto;animation:sUp .3s}
@keyframes sUp{from{transform:translateY(100%)}to{transform:none}}
.set-panel h2{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between}
.set-close{width:30px;height:30px;border-radius:50%;border:none;background:#f0f1f5;font-size:14px;cursor:pointer}
.sg{margin-bottom:14px}
.sg label{display:block;font-size:12px;color:var(--txt2);margin-bottom:6px;font-weight:500}
.sg input,.sg select,.sg textarea{width:100%;border:1.5px solid var(--bdr);border-radius:12px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
.sg input:focus,.sg select:focus,.sg textarea:focus{border-color:var(--pri)}
.sg textarea{resize:vertical;min-height:70px}
.rr{display:flex;align-items:center;gap:10px}
.rr input[type=range]{flex:1;accent-color:var(--pri)}
.rr span{font-size:13px;min-width:36px;text-align:right;font-weight:600}
.tg-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.tg-row span{font-size:14px}
.tg{width:48px;height:28px;background:#d1d5db;border-radius:14px;position:relative;cursor:pointer;transition:background .3s}
.tg.on{background:var(--pri)}
.tg::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:50%;transition:left .3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tg.on::after{left:22px}
.set-btns{display:flex;gap:10px;margin-top:18px}
.set-btns button{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.btn-cancel{background:#f0f1f5;color:var(--txt2)}
.btn-save{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,26,46,.85);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;z-index:300;pointer-events:none}
</style>
</head>
<body>
<div class="hd">
<div class="hd-title">API易 AI对话</div>
<div class="hd-right">
<div class="hd-btn" onclick="clearChat()">🗑</div>
<div class="hd-btn" onclick="openSet()">⚙</div>
</div>
</div>
<div class="chat" id="chat">
<div class="empty"><div class="empty-icon">💬</div><div class="empty-t">开始新对话</div><div class="empty-s">点击右上角 ⚙ 设置API Key<br>选择模型后即可聊天</div></div>
</div>
<div class="input-bar"><div class="input-wrap"><textarea id="msgInput" placeholder="输入消息..." rows="1"></textarea><button class="send-btn" id="sendBtn" onclick="send()">▶</button></div></div>
<div class="set-overlay" id="setPanel" onclick="if(event.target===this)closeSet()">
<div class="set-panel">
<h2>设置 <button class="set-close" onclick="closeSet()">✕</button></h2>
<div class="sg"><label>API Key</label><input type="password" id="sKey" placeholder="sk-xxx"></div>
<div class="sg"><label>API地址</label><input id="sUrl" value="https://api.apiyi.com/v1"></div>
<div class="sg"><label>模型</label><select id="sModel">
<optgroup label="Grok"><option value="grok-4.3">grok-4.3</option><option value="grok-4.20-beta">grok-4.20-beta</option><option value="grok-4">grok-4</option><option value="grok-4-fast">grok-4-fast</option><option value="grok-4-1-fast">grok-4-1-fast</option></optgroup>
<optgroup label="GPT"><option value="gpt-5.5">gpt-5.5</option><option value="gpt-5.4-pro">gpt-5.4-pro</option><option value="gpt-5.4">gpt-5.4</option><option value="gpt-5.4-mini">gpt-5.4-mini</option><option value="gpt-5.4-nano">gpt-5.4-nano</option><option value="gpt-5.2">gpt-5.2</option><option value="gpt-5.1">gpt-5.1</option><option value="gpt-5-pro">gpt-5-pro</option><option value="gpt-5">gpt-5</option><option value="gpt-5-mini">gpt-5-mini</option><option value="gpt-5-nano">gpt-5-nano</option><option value="gpt-4o">gpt-4o</option><option value="gpt-4o-mini">gpt-4o-mini</option><option value="gpt-4.1">gpt-4.1</option><option value="gpt-4.1-mini">gpt-4.1-mini</option><option value="gpt-4.1-nano">gpt-4.1-nano</option><option value="gpt-4-turbo">gpt-4-turbo</option><option value="gpt-3.5-turbo">gpt-3.5-turbo</option></optgroup>
<optgroup label="O系列"><option value="o4-mini">o4-mini</option><option value="o3">o3</option><option value="o3-mini">o3-mini</option><option value="o1">o1</option><option value="o1-mini">o1-mini</option></optgroup>
<optgroup label="Claude"><option value="claude-opus-4-7">claude-opus-4-7</option><option value="claude-opus-4-7-thinking">claude-opus-4-7-thinking</option><option value="claude-opus-4-6">claude-opus-4-6</option><option value="claude-opus-4-6-thinking">claude-opus-4-6-thinking</option><option value="claude-opus-4-5-20251101">claude-opus-4-5</option><option value="claude-opus-4-5-20251101-thinking">claude-opus-4-5-thinking</option><option value="claude-sonnet-4-6">claude-sonnet-4-6</option><option value="claude-sonnet-4-6-thinking">claude-sonnet-4-6-thinking</option><option value="claude-sonnet-4-5-20250929">claude-sonnet-4-5</option><option value="claude-sonnet-4-5-20250929-thinking">claude-sonnet-4-5-thinking</option><option value="claude-sonnet-4-20250514">claude-sonnet-4</option><option value="claude-sonnet-4-20250514-thinking">claude-sonnet-4-thinking</option><option value="claude-haiku-4-5-20251001">claude-haiku-4-5</option><option value="claude-haiku-4-5-20251001-thinking">claude-haiku-4-5-thinking</option></optgroup>
<optgroup label="Gemini"><option value="gemini-3-pro-preview">gemini-3-pro</option><option value="gemini-3-pro-preview-thinking">gemini-3-pro-thinking</option><option value="gemini-3.1-pro-preview">gemini-3.1-pro</option><option value="gemini-3.1-pro-preview-thinking">gemini-3.1-pro-thinking</option><option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option><option value="gemini-2.5-pro">gemini-2.5-pro</option><option value="gemini-2.5-flash">gemini-2.5-flash</option></optgroup>
<optgroup label="DeepSeek"><option value="deepseek-v4-pro">deepseek-v4-pro</option><option value="deepseek-v4-flash">deepseek-v4-flash</option><option value="deepseek-v3.1">deepseek-v3.1</option><option value="deepseek-r1">deepseek-r1</option><option value="deepseek-chat">deepseek-chat</option><option value="deepseek-reasoner">deepseek-reasoner</option></optgroup>
<optgroup label="其他"><option value="kimi-k2.5">kimi-k2.5</option><option value="kimi-k2">kimi-k2</option><option value="qwen3-max">qwen3-max</option><option value="qwen-max">qwen-max</option><option value="glm-5">glm-5</option></optgroup>
</select></div>
<div class="sg"><label>系统提示词</label><textarea id="sSys" placeholder="你是一个有帮助的AI助手"></textarea></div>
<div class="sg"><label>Temperature</label><div class="rr"><input type="range" id="sTemp" min="0" max="2" step="0.1" value="0.7"><span id="sTempV">0.7</span></div></div>
<div class="sg"><label>最大输出Token</label><input type="number" id="sMaxTok" value="4096" min="1" max="128000"></div>
<div class="sg"><label>Top P</label><div class="rr"><input type="range" id="sTopP" min="0" max="1" step="0.05" value="1"><span id="sTopPV">1</span></div></div>
<div class="sg tg-row"><span>流式输出</span><div class="tg on" id="sStream" onclick="this.classList.toggle('on')"></div></div>
<div class="sg tg-row"><span>显示思考过程</span><div class="tg on" id="sThink" onclick="this.classList.toggle('on')"></div></div>
<div class="set-btns"><button class="btn-cancel" onclick="closeSet()">取消</button><button class="btn-save" onclick="saveSet()">保存</button></div>
</div></div>
<script>
var C={key:"",baseUrl:"https://api.apiyi.com/v1",model:"grok-4.3",sys:"",temp:0.7,maxTok:4096,topP:1,stream:true,showThink:true};
var chatH=[],busy=false,ac=null;
function load(){try{var s=localStorage.getItem("acfg");if(s){var d=JSON.parse(s);for(var k in d){if(C.hasOwnProperty(k)){C[k]=d[k]}}}}catch(e){}}
function openSet(){document.getElementById("sKey").value=C.key;document.getElementById("sUrl").value=C.baseUrl;document.getElementById("sModel").value=C.model;document.getElementById("sSys").value=C.sys;document.getElementById("sTemp").value=C.temp;document.getElementById("sTempV").textContent=C.temp;document.getElementById("sMaxTok").value=C.maxTok;document.getElementById("sTopP").value=C.topP;document.getElementById("sTopPV").textContent=C.topP;document.getElementById("sStream").className="tg"+(C.stream?" on":"");document.getElementById("sThink").className="tg"+(C.showThink?" on":"");document.getElementById("setPanel").classList.add("open")}
function closeSet(){document.getElementById("setPanel").classList.remove("open")}
function saveSet(){C.key=document.getElementById("sKey").value.trim();C.baseUrl=document.getElementById("sUrl").value.trim();C.model=document.getElementById("sModel").value;C.sys=document.getElementById("sSys").value.trim();C.temp=parseFloat(document.getElementById("sTemp").value);C.maxTok=parseInt(document.getElementById("sMaxTok").value)||4096;C.topP=parseFloat(document.getElementById("sTopP").value);C.stream=document.getElementById("sStream").classList.contains("on");C.showThink=document.getElementById("sThink").classList.contains("on");localStorage.setItem("acfg",JSON.stringify(C));closeSet();toast("已保存")}
function toast(m){var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},1500)}
function md(t){if(!t)return "";t=t.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,l,c){return '<pre><code>'+esc(c.trim())+'</code></pre>';});t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');t=t.replace(/^#### (.+)$/gm,'<strong style="font-size:14px">$1</strong>');t=t.replace(/^### (.+)$/gm,'<strong style="font-size:15px">$1</strong>');t=t.replace(/^## (.+)$/gm,'<strong style="font-size:16px">$1</strong>');t=t.replace(/^# (.+)$/gm,'<strong style="font-size:18px">$1</strong>');t=t.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');t=t.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');t=t.replace(/(<li>.*<\/li>\n?)+/g,function(m2){return '<ul>'+m2+'</ul>';});t=t.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');t=t.replace(/^---$/gm,'<hr style="border:none;border-top:1px solid #e8e8ed;margin:10px 0">');var ps=t.split(/\n\n+/),h="";for(var i=0;i<ps.length;i++){var p=ps[i].trim();if(!p)continue;if(p[0]==='<' && (p.indexOf('<pre>')===0||p.indexOf('<ul>')===0||p.indexOf('<blockquote>')===0||p.indexOf('<hr')===0||p.indexOf('<strong')===0)){h+=p}else{h+='<p>'+p.replace(/\n/g,'<br>')+'</p>'}}return h}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function addMsg(role,txt,think){var ch=document.getElementById("chat");var em=ch.querySelector('.empty');if(em)em.remove();var d=document.createElement("div");d.className="msg "+(role==="user"?"msg-u":"msg-a");if(role==="user"){var b=document.createElement("div");b.className="bbl";b.textContent=txt;d.appendChild(b)}else{if(think && C.showThink){var tt=document.createElement("div");tt.className="thk-toggle";tt.textContent="思考过程";var tb=document.createElement("div");tb.className="thk-box";tb.textContent=think;tt.onclick=function(){this.classList.toggle("open");tb.classList.toggle("show");};d.appendChild(tt);d.appendChild(tb)}var b=document.createElement("div");b.className="bbl";b.innerHTML=md(txt);d.appendChild(b)}ch.appendChild(d);ch.scrollTop=9e9;return b}
function upBbl(b,t){b.innerHTML=md(t);document.getElementById("chat").scrollTop=9e9;}
function clearChat(){chatH=[];document.getElementById("chat").innerHTML='<div class="empty"><div class="empty-icon">💬</div><div class="empty-t">开始新对话</div><div class="empty-s">点击右上角 ⚙ 设置API Key<br>选择模型后即可聊天</div></div>';toast("已清空")}
function useMCT(m){var n=m.toLowerCase();return n.indexOf('o1')===0||n.indexOf('o3')===0||n.indexOf('o4')===0||n==='gpt-4-turbo'||n.indexOf('gpt-5')===0}
async function send(){var inp=document.getElementById("msgInput");var txt=inp.value.trim();if(!txt||busy)return;if(!C.key){toast("请先设置API Key");openSet();return}inp.value="";inp.style.height="auto";busy=true;var btn=document.getElementById("sendBtn");btn.innerHTML="■";btn.classList.add("stop");btn.onclick=stopGen;addMsg("user",txt);chatH.push({role:"user",content:txt});var ms=[];if(C.sys)ms.push({role:"system",content:C.sys});ms=ms.concat(chatH);var bd={model:C.model,messages:ms,temperature:C.temp,top_p:C.topP};if(useMCT(C.model)){bd.max_completion_tokens=C.maxTok}else{bd.max_tokens=C.maxTok}var bbl=addMsg("ai","");var aiT="",thkT="",inThk=false;if(C.stream){try{ac=new AbortController();var r=await fetch(C.baseUrl+"/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+C.key},body:JSON.stringify(bd),signal:ac.signal});if(!r.ok){var e=await r.text();try{e=JSON.parse(e).error.message||e}catch(ex){}bbl.innerHTML='<span style="color:#ef4444">⚠ '+esc(e)+'</span>';chatH.pop();busy=false;rstBtn();return}var rd=r.body.getReader();var dc=new TextDecoder();var buf="";while(true){var res=await rd.read();if(res.done)break;buf+=dc.decode(res.value,{stream:true});var ls=buf.split("\n");buf=ls.pop();for(var i=0;i<ls.length;i++){var ln=ls[i].trim();if(!ln||!ln.startsWith("data:"))continue;var dt=ln.slice(5).trim();if(dt==="[DONE]")break;try{var j=JSON.parse(dt);var dl=j.choices && j.choices[0] && j.choices[0].delta;if(dl){if(dl.reasoning_content){thkT+=dl.reasoning_content;inThk=true}if(dl.content){if(inThk)inThk=false;aiT+=dl.content}upBbl(bbl,aiT)}}catch(ex){}}}}catch(e){if(e.name!=="AbortError"){bbl.innerHTML='<span style="color:#ef4444">⚠ '+esc(e.message)+'</span>';chatH.pop()}}}else{try{ac=new AbortController();var r=await fetch(C.baseUrl+"/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+C.key},body:JSON.stringify(bd),signal:ac.signal});if(!r.ok){var e=await r.text();try{e=JSON.parse(e).error.message||e}catch(ex){}bbl.innerHTML='<span style="color:#ef4444">⚠ '+esc(e)+'</span>';chatH.pop();busy=false;rstBtn();return}var j=await r.json();var ch=j.choices && j.choices[0];if(ch){aiT=ch.message && ch.message.content||"";if(ch.message && ch.message.reasoning_content){thkT=ch.message.reasoning_content}upBbl(bbl,aiT)}}catch(e){if(e.name!=="AbortError"){bbl.innerHTML='<span style="color:#ef4444">⚠ '+esc(e.message)+'</span>';chatH.pop()}}}if(aiT){chatH.push({role:"assistant",content:aiT})}if(thkT && C.showThink){var md2=bbl.parentElement;var tt=document.createElement("div");tt.className="thk-toggle";tt.textContent="思考过程";var tb=document.createElement("div");tb.className="thk-box";tb.textContent=thkT;tt.onclick=function(){this.classList.toggle("open");tb.classList.toggle("show")};md2.insertBefore(tb,md2.firstChild);md2.insertBefore(tt,md2.firstChild)}busy=false;rstBtn()}
function stopGen(){if(ac){ac.abort();ac=null}busy=false;rstBtn()}
function rstBtn(){var b=document.getElementById("sendBtn");b.innerHTML="▶";b.classList.remove("stop");b.onclick=send}
document.getElementById("msgInput").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,100)+"px"});
document.getElementById("msgInput").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey&&!e.isComposing){e.preventDefault();send()}});
document.getElementById("sTemp").addEventListener("input",function(){document.getElementById("sTempV").textContent=this.value});
document.getElementById("sTopP").addEventListener("input",function(){document.getElementById("sTopPV").textContent=this.value});
load();
</script>
</body>
</html>
